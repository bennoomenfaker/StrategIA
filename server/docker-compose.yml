version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: strategia-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: strategia_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: strategia-backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://root:root@postgres:5432/strategia_db
      COLLECTOR_ENGINE_URL: http://collector-engine:8000
    ports:
      - '3000:3000'
    command: ['node', 'dist/main']

  collector-engine:
    build:
      context: ./collector-engine
      dockerfile: Dockerfile
    container_name: strategia-collector
    restart: always
    environment:
      API_URL: http://backend:3000/api
    ports:
      - '8000:8000'
    volumes:
      - collector_data:/app/data
    command: ['scrapy', 'crawl', 'strategic_web', '-a', 'mode=continuous']

  frontend:
    build:
      context: ../../client
      dockerfile: Dockerfile
    container_name: strategia-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_COLLECTOR_URL: http://localhost:8000
    ports:
      - '3001:3001'
    depends_on:
      - backend

volumes:
  postgres_data:
  collector_data:
